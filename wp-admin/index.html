<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="noindex, nofollow">
    <title>Admin - Bazzar Boutique Hotel</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #f1f1f1;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        .container {
            background: #fff;
            border-radius: 8px;
            box-shadow: 0 2px 20px rgba(0,0,0,0.1);
            padding: 50px 40px;
            max-width: 480px;
            width: 90%;
            text-align: center;
        }
        h1 {
            color: #333;
            font-size: 22px;
            margin-bottom: 12px;
        }
        p {
            color: #666;
            font-size: 15px;
            line-height: 1.6;
            margin-bottom: 30px;
        }
        .contact-info {
            background: #f9f9f9;
            border: 1px solid #e0e0e0;
            border-radius: 6px;
            padding: 25px;
            text-align: left;
        }
        .contact-info h2 {
            color: #222;
            font-size: 18px;
            margin-bottom: 15px;
        }
        .contact-item {
            margin-bottom: 12px;
            font-size: 15px;
            color: #444;
        }
        .contact-item:last-child {
            margin-bottom: 0;
        }
        .contact-item a {
            color: #0073aa;
            text-decoration: none;
        }
        .contact-item a:hover {
            text-decoration: underline;
        }
        .label {
            font-weight: 600;
            display: inline-block;
            min-width: 70px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Website Administration</h1>
        <p>This website is managed by ITConnect. For any website-related inquiries, changes, or support, please contact us directly:</p>
        <div class="contact-info">
            <h2>ITConnect</h2>
            <div class="contact-item">
                <span class="label">Email:</span>
                <a href="mailto:helpdesk@itconnect.ge">helpdesk@itconnect.ge</a>
            </div>
            <div class="contact-item">
                <span class="label">Phone:</span>
                <a href="tel:+995322420710">+995 32 2 420 710</a>
            </div>
            <div class="contact-item">
                <span class="label">Web:</span>
                <a href="https://itconnect.ge" target="_blank" rel="noopener">itconnect.ge</a>
            </div>
        </div>
    </div>
</body>
</html>
